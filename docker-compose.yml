services:
  mongo:
    image: mongo:7.0
    container_name: resumeiq_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - resumeiq_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: resumeiq_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - resumeiq_net

  backend:
    build: .
    container_name: resumeiq_backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/resumeiq
      FLASK_DEBUG: "false"
      PYTHONPATH: /app
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - resumeiq_net

volumes:
  mongo_data:

networks:
  resumeiq_net: