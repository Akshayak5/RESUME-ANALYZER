<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — ResumeAI</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">ResumeAI</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="analyze.html">📄 Analyze Resume</a>
      <a href="history.html" class="active">📂 History</a>
      <a href="quiz.html">✅ Skill Verify</a>
      <a href="profile.html">👤 Profile</a>
    </nav>
    <div style="margin-top:auto;padding:12px"><button onclick="Auth.logout()" class="btn-outline" style="width:100%;font-size:13px">← Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Resume History</h1>
      <p>All your previously analyzed resumes, from newest to oldest.</p>
    </div>

    <div id="historyContent">
      <div style="color:var(--text3);font-size:14px">Loading history...</div>
    </div>

    <!-- Detail Modal -->
    <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:40px 20px">
      <div style="max-width:700px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px">
        <div style="display:flex;justify-content:space-between;margin-bottom:24px">
          <h2 style="font-size:20px;font-weight:700" id="modalTitle">Resume Detail</h2>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px">✕</button>
        </div>
        <div id="modalContent"></div>
      </div>
    </div>
  </main>
</div>

<script src="../js/main.js"></script>
<script>
  requireAuth();

  async function loadHistory() {
    const res = await api("/resume/history");
    const el = document.getElementById("historyContent");

    if (!res?.ok) { el.innerHTML = `<p style="color:var(--red)">Failed to load history.</p>`; return; }

    const resumes = res.data.resumes || [];
    if (resumes.length === 0) {
      el.innerHTML = `<div class="card" style="text-align:center;padding:48px">
        <div style="font-size:48px;margin-bottom:16px">📭</div>
        <h3 style="margin-bottom:12px">No resumes yet</h3>
        <p style="color:var(--text2);margin-bottom:24px">Start by analyzing your first resume!</p>
        <a href="analyze.html" class="btn-primary">📄 Analyze Resume</a>
      </div>`;
      return;
    }

    el.innerHTML = `
      <table class="data-table" style="width:100%">
        <thead><tr>
          <th>Filename</th><th>Score</th><th>Top Skills</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${resumes.map(r => {
            const skills = (r.detected_skills || []).slice(0, 3).join(", ") || "—";
            return `<tr>
              <td style="color:var(--text)">${r.filename || "resume"}</td>
              <td><span style="color:${scoreColor(r.score)};font-family:var(--mono);font-weight:700">${r.score}/100</span></td>
              <td style="font-size:12px">${skills}</td>
              <td>${formatDate(r.created_at)}</td>
              <td>
                <button onclick="viewDetail('${r._id}')" class="btn-outline" style="padding:5px 12px;font-size:12px">View</button>
                <button onclick="deleteResume('${r._id}', this)" style="padding:5px 12px;font-size:12px;background:none;border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:var(--red);cursor:pointer;margin-left:6px">Delete</button>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
  }

  async function viewDetail(id) {
    const res = await api(`/resume/${id}`);
    if (!res?.ok) { toast("Failed to load resume details", "error"); return; }
    const r = res.data;
    const a = r.analysis || {};
    document.getElementById("modalTitle").textContent = `${a.name || "Resume"} — Score: ${r.score}/100`;
    document.getElementById("modalContent").innerHTML = `
      <div style="margin-bottom:20px"><p style="color:var(--text2);font-size:13px;line-height:1.7">${a.summary || ""}</p></div>
      <div style="margin-bottom:20px">
        <h4 style="font-size:12px;letter-spacing:1.5px;color:var(--primary2);text-transform:uppercase;font-family:var(--mono);margin-bottom:12px">Detected Skills</h4>
        <div style="display:flex;flex-wrap:wrap;gap:8px">${(a.detectedSkills || []).map(s => `<span class="skill-tag">${s}</span>`).join("") || "None"}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><h4 style="font-size:12px;letter-spacing:1.5px;color:var(--green);text-transform:uppercase;font-family:var(--mono);margin-bottom:10px">Strengths</h4>
          ${(a.strengths || []).map(s => `<p style="color:var(--text2);font-size:13px;margin-bottom:6px">▸ ${s}</p>`).join("")}</div>
        <div><h4 style="font-size:12px;letter-spacing:1.5px;color:var(--yellow);text-transform:uppercase;font-family:var(--mono);margin-bottom:10px">Improvements</h4>
          ${(a.improvements || []).map(s => `<p style="color:var(--text2);font-size:13px;margin-bottom:6px">▸ ${s}</p>`).join("")}</div>
      </div>
      <div style="margin-top:16px"><h4 style="font-size:12px;letter-spacing:1.5px;color:var(--primary2);text-transform:uppercase;font-family:var(--mono);margin-bottom:10px">Recommended Roles</h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${(a.recommendedRoles || []).map(r => `<span class="skill-tag">${r}</span>`).join("")}</div>
      </div>`;
    document.getElementById("modal").style.display = "block";
  }

  async function deleteResume(id, btn) {
    if (!confirm("Delete this resume?")) return;
    const res = await api(`/resume/${id}`, { method: "DELETE" });
    if (res?.ok) { toast("Resume deleted", "success"); loadHistory(); }
    else toast("Failed to delete", "error");
  }

  function closeModal() { document.getElementById("modal").style.display = "none"; }
  document.getElementById("modal").addEventListener("click", e => { if (e.target === document.getElementById("modal")) closeModal(); });

  loadHistory();
</script>
</body>
</html>
