<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — ResumeAI</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">ResumeAI</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="analyze.html">📄 Analyze Resume</a>
      <a href="history.html">📂 History</a>
      <a href="quiz.html">✅ Skill Verify</a>
      <a href="profile.html" class="active">👤 Profile</a>
    </nav>
    <div style="margin-top:auto;padding:12px"><button onclick="Auth.logout()" class="btn-outline" style="width:100%;font-size:13px">← Logout</button></div>
  </aside>

  <main class="main-content" style="max-width:680px">
    <div class="page-header">
      <h1>My Profile</h1>
      <p>Manage your account information and preferences.</p>
    </div>

    <!-- Avatar & Name -->
    <div class="card" style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
      <div id="avatarEl" style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0">?</div>
      <div>
        <h2 id="profileName" style="font-size:20px;font-weight:700">Loading...</h2>
        <p id="profileEmail" style="color:var(--text3);font-size:14px;margin-top:4px"></p>
        <p id="profileMeta" style="color:var(--text3);font-size:12px;margin-top:4px"></p>
      </div>
    </div>

    <!-- Edit Form -->
    <div class="card" style="margin-bottom:20px">
      <h3 style="font-size:12px;letter-spacing:2px;color:var(--primary2);text-transform:uppercase;font-family:var(--mono);margin-bottom:20px">Edit Profile</h3>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="editName" class="form-input" type="text"/>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input id="editLocation" class="form-input" type="text" placeholder="e.g. San Francisco, CA"/>
      </div>
      <div class="form-group">
        <label class="form-label">LinkedIn URL</label>
        <input id="editLinkedin" class="form-input" type="url" placeholder="https://linkedin.com/in/yourname"/>
      </div>
      <div class="form-group">
        <label class="form-label">GitHub URL</label>
        <input id="editGithub" class="form-input" type="url" placeholder="https://github.com/yourname"/>
      </div>
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea id="editBio" class="form-input" rows="3" placeholder="A short bio about yourself..."></textarea>
      </div>
      <button id="saveBtn" onclick="saveProfile()" class="btn-primary">Save Changes</button>
      <div id="saveMsg" class="success-msg" style="display:none"></div>
      <div id="saveErr" class="error-msg" style="display:none"></div>
    </div>

    <!-- Stats -->
    <div class="card">
      <h3 style="font-size:12px;letter-spacing:2px;color:var(--primary2);text-transform:uppercase;font-family:var(--mono);margin-bottom:20px">Account Stats</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px" id="acctStats">
        <div><div style="font-size:11px;color:var(--text3);letter-spacing:1px;font-family:var(--mono)">RESUMES</div><div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--primary2)" id="stResumes">—</div></div>
        <div><div style="font-size:11px;color:var(--text3);letter-spacing:1px;font-family:var(--mono)">VERIFIED</div><div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--purple)" id="stVerified">—</div></div>
        <div><div style="font-size:11px;color:var(--text3);letter-spacing:1px;font-family:var(--mono)">BEST SCORE</div><div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--green)" id="stBest">—</div></div>
      </div>
    </div>
  </main>
</div>

<script src="../js/main.js"></script>
<script>
  requireAuth();

  async function loadProfile() {
    const [meRes, statsRes] = await Promise.all([
      api("/auth/me"),
      api("/dashboard/stats")
    ]);

    if (meRes?.ok) {
      const u = meRes.data;
      document.getElementById("avatarEl").textContent = (u.name || "?")[0].toUpperCase();
      document.getElementById("profileName").textContent = u.name || "—";
      document.getElementById("profileEmail").textContent = u.email || "—";
      document.getElementById("profileMeta").textContent = `Member since ${formatDate(u.created_at)} · ${u.resume_count || 0} resumes analyzed`;
      document.getElementById("editName").value = u.name || "";
      document.getElementById("editLocation").value = u.profile?.location || "";
      document.getElementById("editLinkedin").value = u.profile?.linkedin || "";
      document.getElementById("editGithub").value = u.profile?.github || "";
      document.getElementById("editBio").value = u.profile?.bio || "";
    }

    if (statsRes?.ok) {
      const d = statsRes.data;
      document.getElementById("stResumes").textContent = d.resume_stats?.total ?? 0;
      document.getElementById("stVerified").textContent = d.verified_count ?? 0;
      document.getElementById("stBest").textContent = d.resume_stats?.best_score ?? 0;
    }
  }

  async function saveProfile() {
    const btn = document.getElementById("saveBtn");
    const msgEl = document.getElementById("saveMsg");
    const errEl = document.getElementById("saveErr");
    msgEl.style.display = "none"; errEl.style.display = "none";
    btn.innerHTML = '<span class="spinner"></span> Saving...'; btn.disabled = true;

    const res = await api("/auth/profile", {
      method: "PUT",
      body: JSON.stringify({
        name: document.getElementById("editName").value.trim(),
        profile: {
          location: document.getElementById("editLocation").value.trim(),
          linkedin: document.getElementById("editLinkedin").value.trim(),
          github: document.getElementById("editGithub").value.trim(),
          bio: document.getElementById("editBio").value.trim()
        }
      })
    });

    btn.innerHTML = "Save Changes"; btn.disabled = false;

    if (res?.ok) {
      Auth.setUser(res.data);
      msgEl.textContent = "Profile updated successfully!"; msgEl.style.display = "block";
      loadProfile();
      setTimeout(() => msgEl.style.display = "none", 3000);
    } else {
      errEl.textContent = res?.data?.error || "Save failed"; errEl.style.display = "block";
    }
  }

  loadProfile();
</script>
</body>
</html>
